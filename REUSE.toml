version = 1

[[annotations]]
path = [
  "renovate.json",
  "docs/Licenser/*.txt",
  "src/main/resources/shapes/dcat-ap-SHACL.ttl",
  "src/main/resources/shapes/vocabularies/*.rdf"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2022 Agency for Digital Government"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = [
  "pom.xml",
  "Dockerfile",
  "README.md",
  "DEVELOPMENT.md",
  "docs/*.md",
  "docs/**/.png",
  "docs/jenkinsfile",
  "src/**/*.json",
  "src/**/*.raml",
  "src/**/*.yaml",
  "src/main/resources/templates/*.ftlh",
