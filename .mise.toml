# Tool versions for mise (https://mise.jdx.dev/)
# Install all tools: mise install
# Activate in shell: eval "$(mise activate bash)"

[settings]
experimental = true  # Enable experimental features
paranoid = true      # Enable strict security checks and verification

[env]
# Proxy configuration - available during tool installation AND runtime
HTTP_PROXY = "{{ get_env(name='HTTP_PROXY', default='') }}"
HTTPS_PROXY = "{{ get_env(name='HTTPS_PROXY', default='') }}"
NO_PROXY = "{{ get_env(name='NO_PROXY', default='') }}"
http_proxy = "{{ get_env(name='http_proxy', default='') }}"
https_proxy = "{{ get_env(name='https_proxy', default='') }}"
no_proxy = "{{ get_env(name='no_proxy', default='') }}"

# Pip/pipx configuration
PIP_INDEX_URL = "{{ get_env(name='PIP_INDEX_URL', default='') }}"

[tools]
"aqua:casey/just" = "1.47.1"
"aqua:rvben/rumdl" = "v0.1.57"
"aqua:google/yamlfmt" = "v0.21.0"
"aqua:rhysd/actionlint" = "v1.7.11"
"aqua:zricethezav/gitleaks" = "v8.30.1"
"forgejo:itiquette/gommitlint" = "0.9.10"
"aqua:koalaman/shellcheck" = "v0.11.0"
"aqua:mvdan/sh" = "v3.13.0"  # shfmt - Shell formatter
"aqua:hadolint/hadolint" = "v2.14.0"
"aqua:sharkdp/fd" = "v10.4.2"
"aqua:BurntSushi/ripgrep" = "15.1.0"
"aqua:tldr-pages/tlrc" = "v1.12.0"
yq = "4.52.4"
"pipx:reuse" = "6.2.0"
"aqua:bats-core/bats-core" = "1.13.0"
