# Artifacts Configuration for dcat-ap-se-processor
# Defines what to build and where to publish

artifacts:
  - name: dcat-ap-se-processor
    project-type: maven
    working-directory: .
    build-type: application
    config:
      java-version: 25

containers:
  - name: dcat-ap-se-processor
    from: [dcat-ap-se-processor]
    container-file: Containerfile
    context: .
    platforms: linux/amd64,linux/arm64
    registry: ghcr.io

publishers:
  - type: github-packages
    artifacts: [dcat-ap-se-processor]
