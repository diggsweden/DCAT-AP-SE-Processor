name: OpenSSF Scorecard Analysis
on:
  schedule:
    # Saturdays at 02:40 UTC
    - cron: "40 2 * * 6"
    # Wednesdays at 02:40 UTC
    - cron: "40 2 * * 3"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scorecard-analysis:
    permissions:
      contents: read
      security-events: write
      id-token: write
    uses: diggsweden/reusable-ci/.github/workflows/security-openssf-scorecard.yml@617cb32268cb6aefdfa4117b4159d37e3b47d7b3 # v2.8.3
    with:
      publish-results: true
